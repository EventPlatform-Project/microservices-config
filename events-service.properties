server.port=8082
springdoc.api-docs.path=/api/events/v3/api-docs

# Utilise MYSQL_HOST (docker) ou localhost (PC)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/db_events?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true