server.port=8082

springdoc.api-docs.path=/api/events/v3/api-docs

# --- Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/db_events?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Notification service (Node.js) ---
# URL used by Ms-Event to POST notifications when an event is created.
notification.service.url=http://localhost:9000
