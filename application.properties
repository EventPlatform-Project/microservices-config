# =====================================================================
# Shared defaults for ALL microservices (served by config-server)
# =====================================================================

# --- Eureka ---
# Utilise EUREKA_HOST (dťfini dans Docker) ou localhost par dťfaut
eureka.client.serviceUrl.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/
eureka.instance.prefer-ip-address=true

# --- Keycloak (OAuth2 resource server) ---
# Utilise KEYCLOAK_HOST (dťfini dans Docker) ou localhost par dťfaut
#spring.security.oauth2.resourceserver.jwt.issuer-uri=http://${KEYCLOAK_HOST:localhost}:8180/realms/microservices-realm
#spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://${KEYCLOAK_HOST:localhost}:8180/realms/microservices-realm/protocol/openid-connect/certs

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8180/realms/microservices-realm/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/microservices-realm
# On garde localhost:5173 car c'est le NAVIGATEUR sur ton PC qui accŤde au front
app.cors.allowed-origins=http://localhost:5173

# --- Behind API Gateway ---
server.forward-headers-strategy=framework

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,refresh