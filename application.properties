# =====================================================================
# Shared defaults for ALL microservices (served by config-server).
# =====================================================================

# --- Eureka ---
# KEYCLOAK_HOST / EUREKA_HOST are set to Docker service names inside
# docker-compose. On the host machine they resolve to "localhost".
eureka.client.serviceUrl.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/
eureka.instance.prefer-ip-address=true

# --- Keycloak (OAuth2 resource server) ---
# The JWK Set URI must resolve wherever the service runs:
#   - inside Docker  : KEYCLOAK_HOST=keycloak -> http://keycloak:8180
#   - on the host    : KEYCLOAK_HOST unset    -> http://localhost:8180
# The issuer-uri must match the `iss` claim inside the JWT verbatim.
# Since the browser logs in via http://localhost:8180, Keycloak stamps
# tokens with issuer "http://localhost:8180/realms/microservices-realm".
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://${KEYCLOAK_HOST:localhost}:8180/realms/microservices-realm/protocol/openid-connect/certs
# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/microservices-realm

# --- CORS ---
# The browser origin (Vite dev server). It's always localhost:5173 for
# the developer's machine, regardless of where the backend runs.
app.cors.allowed-origins=*

# --- Behind API Gateway ---
server.forward-headers-strategy=framework

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,refresh
