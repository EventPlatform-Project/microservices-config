server.port=7890

# --- Database ---
# Utilise POSTGRES_HOST (dï¿½fini dans docker-compose) ou localhost par dï¿½faut
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/users
